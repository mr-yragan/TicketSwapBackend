services:
  postgres:
    image: postgres:17
    container_name: ticketswap-postgres
    environment:
      POSTGRES_DB: ticketswap
      POSTGRES_USER: ticketswap
      POSTGRES_PASSWORD: ticketswap
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketswap -d ticketswap"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ticketswap-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build: .
    container_name: ticketswap-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ticketswap
      SPRING_DATASOURCE_USERNAME: ticketswap
      SPRING_DATASOURCE_PASSWORD: ticketswap
      TICKETSWAP_STORAGE_S3_ENDPOINT: http://minio:9000
      TICKETSWAP_STORAGE_S3_ACCESS_KEY: minioadmin
      TICKETSWAP_STORAGE_S3_SECRET_KEY: minioadmin123
      TICKETSWAP_STORAGE_S3_BUCKET: ticketswap-ticket-files
      TICKETSWAP_STORAGE_S3_PUBLIC_ENDPOINT: http://localhost:9000
    ports:
      - "8080:8080"

volumes:
  minio-data:
