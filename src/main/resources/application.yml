spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticketswap}
    username: ${SPRING_DATASOURCE_USERNAME:ticketswap}
    password: ${SPRING_DATASOURCE_PASSWORD:ticketswap}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

ticketswap:
  security:
    jwt:
      secret: ${TICKETSWAP_JWT_SECRET:ticketswap-secret-ticketswap-secret-ticketswap-secret-123456}
      expiration-ms: ${TICKETSWAP_JWT_EXPIRATION_MS:86400000}
    two-factor:
      code-expiration-ms: ${TICKETSWAP_2FA_CODE_EXPIRATION_MS:300000}
      max-attempts: ${TICKETSWAP_2FA_MAX_ATTEMPTS:5}
    password-reset:
      token-expiration-ms: ${TICKETSWAP_PASSWORD_RESET_TOKEN_EXPIRATION_MS:900000}
  cors:
    allowed-origins: ${TICKETSWAP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  storage:
    s3:
      endpoint: ${TICKETSWAP_STORAGE_S3_ENDPOINT:http://localhost:9000}
      access-key: ${TICKETSWAP_STORAGE_S3_ACCESS_KEY:minioadmin}
      secret-key: ${TICKETSWAP_STORAGE_S3_SECRET_KEY:minioadmin123}
      bucket: ${TICKETSWAP_STORAGE_S3_BUCKET:ticketswap-ticket-files}
      presigned-get-expiry-minutes: ${TICKETSWAP_STORAGE_S3_PRESIGNED_GET_EXPIRY_MINUTES:15}
      auto-create-bucket: ${TICKETSWAP_STORAGE_S3_AUTO_CREATE_BUCKET:true}
  mail:
    from: ${TICKETSWAP_MAIL_FROM:no-reply@ticketswap.local}
    password-reset-url-base: ${TICKETSWAP_PASSWORD_RESET_URL_BASE:http://localhost:3000/reset-password}
