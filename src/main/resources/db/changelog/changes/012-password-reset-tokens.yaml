databaseChangeLog:
  - changeSet:
      id: 013-create-password-reset-tokens
      author: nikolay
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_password_reset_tokens_user
                    references: users(id)
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: consumed_at
                  type: timestamp with time zone
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: password_reset_tokens
            columnNames: token_hash
            constraintName: uq_password_reset_tokens_token_hash
        - createIndex:
            tableName: password_reset_tokens
            indexName: idx_password_reset_tokens_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: password_reset_tokens
            indexName: idx_password_reset_tokens_expires_at
            columns:
              - column:
                  name: expires_at
